name: Weekly commercial update (Friday Spain)

# Un solo cron a las 12:30 UTC los viernes:
#   - Verano (CEST, marzo-octubre): 14:30 hora local Madrid
#   - Invierno (CET, octubre-marzo): 13:30 hora local Madrid
# Aceptamos esa deriva de 1h en invierno a cambio de robustez (sin guards
# fragiles). GitHub Actions retrasa los crons habitualmente, por eso
# eliminamos la comprobacion de hora local que rechazaba runs retrasados.
on:
  schedule:
    - cron: '30 12 * * 5'    # 12:30 UTC viernes -> 14:30 CEST verano / 13:30 CET invierno
  workflow_dispatch:          # boton manual en la pestana Actions

permissions:
  contents: write              # necesario para hacer commit de los HTMLs

concurrency:
  group: weekly-update
  cancel-in-progress: false

jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Pull data from Odoo and build HTMLs
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
          PAGOS_CSV_URL: ${{ secrets.PAGOS_CSV_URL }}
        run: |
          cd scripts
          python fetch_odoo.py
          python fetch_pagos.py
          python build_dataset.py
          python build_tariffs.py
          python patch_build_html.py
          python build_html.py --per-commercial
          cp por_comercial/*.html ../
          ls -la ../*.html

      - name: Commit and push HTMLs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Comisiones_*.html
          if git diff --cached --quiet; then
            echo "No hay cambios en los HTMLs."
          else
            git commit -m "Weekly update $(TZ='Europe/Madrid' date +'%Y-%m-%d %H:%M')"
            git push
          fi

      - name: Send commercial reminder emails
        if: false  # TEMP: manual run sin emails — restaurar después
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          REPORT_FROM: "apm@industrialshields.com"
        run: |
          cd scripts
          python send_emails.py
